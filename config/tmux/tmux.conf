# ~/.config/tmux/tmux.conf

# --- general ---------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"   # truecolor
set -g mouse on
set -g base-index 1                          # windows start at 1
setw -g pane-base-index 1                    # panes start at 1
set -g renumber-windows on
set -g escape-time 10
set -g history-limit 50000
set -g focus-events on

# --- claude state indicator ------------------------------------------------
# tmux-claude-statusline prints an orange/red/blue dot per session, fed by the
# claude-tmux-notify hook. status-interval is the fallback refresh; the hook
# also forces an immediate `refresh-client -S` on every state change.
set -g status-interval 5
set -g status-right-length 120
set -g status-right '#($HOME/.local/bin/tmux-claude-statusline) #[fg=colour245]%H:%M '
set -g status-left-length 100
set -g status-left '#[fg=colour110] #S       #[default]'
set -g status-style 'bg=colour235,fg=colour245'

# Window list: padded, current window shown as a soft pastel pill.
set -g window-status-separator ' '
set -g window-status-format '#[fg=colour244] #I #W '
set -g window-status-current-format '#[fg=colour236,bg=colour152] #I #W #[default]'

# Thin grey hairline between panes and status bar. status-format[0] is the TOP
# line of the bottom status block, so the rule goes on [0] and the normal status
# content (status-left + window list + status-right) moves to [1] below it.
# tmux has no repeat-to-width, so the rule is an over-long run of box-drawing
# chars that tmux truncates to the client width.
# ponytail: hardcoded dash run; only clean alternative is #[fill=…] (solid bar).
set -g status 2
set -g 'status-format[0]' '#[fg=colour240]──────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────'
set -g 'status-format[1]' '#[align=left range=left #{E:status-left-style}]#[push-default]#{T;=/#{status-left-length}:status-left}#[pop-default]#[norange default]#[list=on align=#{status-justify}]#[list=left-marker]<#[list=right-marker]>#[list=on]#{W:#[range=window|#{window_index} #{E:window-status-style}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default]#{?loop_last_flag,,#{window-status-separator}},#[range=window|#{window_index} list=focus #{?#{!=:#{E:window-status-current-style},default},#{E:window-status-current-style},#{E:window-status-style}}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange list=on default]#{?loop_last_flag,,#{window-status-separator}}}#[nolist align=right range=right #{E:status-right-style}]#[push-default]#{T;=/#{status-right-length}:status-right}#[pop-default]#[norange default]'

# --- sessionizer -----------------------------------------------------------
# prefix + f  ->  fuzzy sessionizer in a centered popup.
bind f display-popup -E -w 80% -h 80% "tmux_sessionizer"
# prefix + F  ->  force the repo picker first.
bind F display-popup -E -w 80% -h 80% "tmux_sessionizer --repo"

# --- pane navigation -------------------------------------------------------
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind r source-file ~/.config/tmux/tmux.conf \; display "reloaded"
