# See https://wiki.hyprland.org/Configuring/Monitors/

# Monitors
source=~/.config/hypr/monitors.conf
source=~/.config/hypr/workspaces.conf

# monitor=eDP-1,highres,auto,2
# monitor=DP-4,highres,auto,1

# Environment
env = XCURSOR_SIZE,12
env = QT_QPA_PLATFORM,wayland
env = HYPRSHOT_DIR,/home/daniel/Pictures/Screenshots
env = GTK_THEME,Adwaita:dark
env = ADW_DISABLE_PORTAL,1

# Start the swww daemon for the lockscreen
exec-once = swww init && swww-daemon --format xrgb
# Idle daemon for screen locking
exec-once = hypridle
# Authentication agent
exec-once=/usr/lib/polkit-kde-authentication-agent-1 
# Start up script for setting up the environment
exec-once = source ~/.config/hypr/scripts/startup.sh
# Dynamically assign workspaces 2 and 3 to whichever external monitor is connected
exec-once = ~/.config/hypr/scripts/monitor_workspace_watcher.sh
# Start waybar
exec-once = waybar
# Start hyprshade
exec = hyprshade auto
exec-once = dbus-update-activation-environment --systemd HYPRLAND_INSTANCE_SIGNATURE


xwayland {
  force_zero_scaling = true
}

# Dark mode
exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"   # for GTK4 / libadwaita apps
exec = gsettings set org.gnome.desktop.interface gtk-theme "adw-gtk3-dark"    # for GTK3 apps

# Qt dark mode (requires: qt5ct qt6ct kvantum breeze-icons)
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_STYLE_OVERRIDE,kvantum

# ===== Input =====
source=~/.config/hypr/conf/input.conf
# ===== General =====
source=~/.config/hypr/conf/general.conf
# ===== Decoration =====
source=~/.config/hypr/conf/decoration.conf
# ===== Animation =====
source=~/.config/hypr/conf/animation.conf
# ===== Other =====
source=~/.config/hypr/conf/other.conf
# ===== Bindings =====
source=~/.config/hypr/conf/bindings.conf
